<!-- But generating a minimal "focused" header for identity -->
<header class="fixed top-0 w-full z-50 bg-slate-50/70 dark:bg-slate-950/70 backdrop-blur-xl flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center gap-4">

</div>
<div class="text-on-surface-variant font-label text-sm font-semibold">
            Step 1 of 5
        </div>
</header>
<main class="flex-grow flex items-center justify-center px-6 pt-24 pb-12">
<div class="max-w-4xl w-full grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">
<!-- Left Side: Editorial Content -->
<div class="lg:col-span-5 space-y-6">
<div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-secondary/10 text-secondary font-label text-xs font-bold uppercase tracking-widest">
                    Rider Application
                </div>
<h1 class="text-5xl font-extrabold tracking-tight text-primary font-headline leading-[1.1]">
                    Create Your Profile
                </h1>
<p class="text-lg text-on-surface-variant leading-relaxed font-body">
                    Join the Dzpatch network and start earning on your own terms. We provide the tools, you provide the momentum.
                </p>
<!-- Visual Element: Bento Style Data Brick -->
</div>
<!-- Right Side: Form Canvas -->
<div class="lg:col-span-7">
<div class="bg-surface-container-lowest p-8 lg:p-12 rounded-xl shadow-[0_-4px_20px_0_rgba(0,13,34,0.06)] relative overflow-hidden">
<!-- Subtle Kinetic Progress Bar -->
<div class="absolute top-0 left-0 w-full h-1.5 bg-surface-container">
<div class="h-full bg-gradient-to-r from-secondary to-secondary-fixed w-1/5 shadow-[0_0_10px_rgba(0,64,224,0.3)]"></div>
</div>
<form class="space-y-8 mt-4">
<div class="space-y-6">
<!-- Input Field: Full Name -->
<div class="group relative">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2 font-label" for="name">Full Name</label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-4 focus:ring-0 peer font-body text-on-surface transition-all" id="name" placeholder="John Doe" type="text"/>
<div class="absolute bottom-0 left-0 h-0.5 w-0 bg-secondary transition-all duration-300 peer-focus:w-full"></div>
</div>
</div>
<!-- Input Field: Email Address -->
<div class="group relative">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2 font-label" for="email">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-4 focus:ring-0 peer font-body text-on-surface transition-all" id="email" placeholder="john@example.com" type="email"/>
<div class="absolute bottom-0 left-0 h-0.5 w-0 bg-secondary transition-all duration-300 peer-focus:w-full"></div>
</div>
</div>
<!-- Input Field: Phone Number -->
<div class="group relative">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2 font-label" for="phone">Phone Number</label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-4 focus:ring-0 peer font-body text-on-surface transition-all" id="phone" placeholder="+1 (555) 000-0000" type="tel"/>
<div class="absolute bottom-0 left-0 h-0.5 w-0 bg-secondary transition-all duration-300 peer-focus:w-full"></div>
</div>
</div>
</div>
<div class="flex flex-col sm:flex-row items-center gap-6 pt-4">
<button class="w-full sm:w-auto px-10 py-4 bg-secondary text-white font-headline font-bold rounded-xl active:scale-95 duration-200 transition-all shadow-lg shadow-secondary/20 hover:bg-on-secondary-fixed-variant" type="button">
                                Next
                            </button>
<p class="text-sm text-on-surface-variant font-body">
                                Step 1 of 5 <span class="mx-2 text-surface-variant">•</span> <a class="text-secondary hover:underline font-semibold" href="#">Log in instead</a>
</p>
</div>
</form>
</div>
