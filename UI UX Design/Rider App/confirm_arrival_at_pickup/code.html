<body class="bg-surface font-body text-on-surface overflow-hidden">
<!-- TopAppBar -->
<header class="bg-white/70 dark:bg-slate-950/70 backdrop-blur-md fixed top-0 w-full z-50 shadow-sm dark:shadow-none">
<div class="flex items-center justify-between px-6 h-16 w-full">

<span class="material-symbols-outlined text-blue-700 dark:text-blue-400" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-manrope font-bold tracking-tight text-xl font-extrabold text-slate-900 dark:text-slate-50">En Route</h1>
<button class="hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors active:scale-95 duration-200 p-2 rounded-full">
<span class="material-symbols-outlined text-blue-700 dark:text-blue-400" data-icon="more_vert">more_vert</span>
</button>
</div>
</header>
<main class="relative h-screen w-full flex items-center justify-center pt-16">
<!-- Map Background -->
<div class="absolute inset-0 z-0">

<div class="absolute inset-0 map-gradient-overlay"></div>
</div>

<div class="w-24 h-24 bg-secondary flex items-center justify-center rounded-full shadow-[0_0_50px_rgba(0,64,224,0.3)] animate-pulse">
<span class="material-symbols-outlined text-white text-5xl" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="mt-4 bg-primary-container text-white px-4 py-1.5 rounded-full font-label text-xs font-bold tracking-widest uppercase">
                Location Reached
            </div>
</div>
<!-- Arrival Card Overlay -->
<div class="absolute bottom-12 left-6 right-6 md:max-w-md md:mx-auto z-20">
<div class="bg-surface-container-lowest p-8 rounded-[2rem] shadow-[0_32px_64px_-12px_rgba(0,13,34,0.12)] border border-white/20 backdrop-blur-sm">
<div class="flex flex-col gap-6">
<div class="space-y-1">
<span class="text-secondary font-label text-[10px] font-extrabold tracking-[0.2em] uppercase">Status Update</span>
<h2 class="font-headline text-3xl font-extrabold text-primary leading-tight">Arrived at Pickup</h2>
</div>
<div class="flex items-start gap-4 p-4 bg-surface-container-low rounded-xl">

<span class="font-body text-sm text-on-surface-variant">1550 N Kingsbury St, Chicago, IL</span>
</div>
</div>

<span class="text-white font-headline font-extrabold text-base tracking-wider uppercase">CONFIRM ARRIVAL</span>
<span class="material-symbols-outlined text-white group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="flex items-center justify-center gap-6 pt-2">
<button class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-lg" data-icon="message">message</span>
<span class="text-xs font-bold uppercase tracking-tighter font-label">Message</span>
</button>
<div class="w-px h-4 bg-outline-variant"></div>

<span class="material-symbols-outlined text-lg" data-icon="call">call</span>
