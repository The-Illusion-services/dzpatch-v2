<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-mesh {
            background: radial-gradient(at 0% 0%, #0a2342 0%, transparent 50%),
                        radial-gradient(at 100% 100%, #000d22 0%, transparent 50%),
                        radial-gradient(at 50% 50%, #001356 0%, transparent 100%);
            background-color: #000d22;
        }
        @keyframes subtle-pulse {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); }
        }
        .animate-subtle {
            animation: subtle-pulse 4s ease-in-out infinite;
        }
        .loading-bar {
            width: 140px;
            height: 2px;
            background: rgba(178, 199, 239, 0.2);
            position: relative;
            overflow: hidden;
            border-radius: 999px;
        }
        .loading-progress {
            position: absolute;
            height: 100%;
            width: 40%;
            background: #dde1ff;
            left: -40%;
            animation: loading-slide 1.5s infinite ease-in-out;
        }
        @keyframes loading-slide {
            0% { left: -40%; }
            100% { left: 100%; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-primary overflow-hidden h-screen w-screen flex flex-col items-center justify-center font-body selection:bg-secondary-container">
<!-- Background Layer with Gradient Texture -->
<div class="absolute inset-0 z-0 bg-mesh opacity-80" data-alt="Dark navy blue atmospheric gradient with subtle grain and organic light pulses representing a premium logistics background"></div>
<!-- Central Branding Anchor -->
<main class="relative z-10 flex flex-col items-center space-y-12">
<!-- Logo Cluster -->
<div class="flex flex-col items-center space-y-4 animate-subtle">
<!-- Iconic Representation -->
<div class="w-20 h-20 bg-secondary flex items-center justify-center rounded-xl shadow-2xl shadow-primary/50">
<span class="material-symbols-outlined text-white text-4xl" data-icon="local_shipping" style="font-variation-settings: 'FILL' 1;">local_shipping</span>
</div>
<!-- Typography Anchor -->
<div class="text-center">
<h1 class="font-headline font-extrabold text-4xl tracking-tighter text-white">
                    Dzpatch
                </h1>
<div class="flex items-center justify-center space-x-2 mt-1">
<span class="h-[1px] w-6 bg-secondary-fixed/30"></span>
<span class="font-label font-semibold text-[10px] uppercase tracking-[0.3em] text-secondary-fixed">
                        RIDER
                    </span>
<span class="h-[1px] w-6 bg-secondary-fixed/30"></span>
</div>
</div>
</div>
<!-- Loading Indicator -->
<div class="flex flex-col items-center space-y-6">
<div class="loading-bar">
<div class="loading-progress"></div>
</div>
<p class="font-label text-xs font-medium text-primary-fixed-dim/60 tracking-wide">
                Authenticating secure terminal...
            </p>
</div>
</main>
<!-- Footer Identity (Discrete) -->
<footer class="absolute bottom-12 z-10 flex flex-col items-center">
<div class="flex items-center space-x-3 text-primary-fixed-dim/40">
<span class="material-symbols-outlined text-lg" data-icon="encrypted">encrypted</span>
<span class="font-label text-[10px] font-bold uppercase tracking-widest">End-to-End Secure Logistics</span>
</div>
</footer>
<!-- Decorative Kinetic Accents -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none z-5">
<div class="absolute top-[20%] right-[15%] w-64 h-64 bg-secondary/5 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[10%] left-[10%] w-96 h-96 bg-primary-container/20 rounded-full blur-[120px]"></div>
</div>
