<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-gradient-kinetic {
            background: linear-gradient(135deg, #000d22 0%, #0a2342 100%);
        }
        .glass-header {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation (Suppressing Shell for Onboarding Focus) -->
<header class="fixed top-0 w-full z-50 px-6 py-6 flex justify-between items-center glass-header">
<div class="text-xl font-extrabold text-primary tracking-tight font-headline">
            Dzpatch Rider
        </div>
<button class="text-on-surface-variant font-semibold text-sm tracking-wide px-4 py-2 hover:bg-surface-container transition-colors rounded-xl">
            Skip
        </button>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-8 pt-24 pb-32 max-w-2xl mx-auto w-full">
<!-- Asymmetric Hero Illustration Section -->
<div class="relative w-full aspect-[4/5] md:aspect-video mb-12 rounded-3xl overflow-hidden group">
<img alt="Delivery rider" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" data-alt="Modern professional delivery rider on a sleek electric scooter in a clean minimalist city setting, soft dawn light, cinematic composition" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAefHwLNIPgiarJuWaa5z0T0T1ohV7eFu5ibZlEoaHRjm30242RyMAkzc8khotGP05RPgHR67vYU0Jdw5CsrsPnkCLRD4KPUAjlZ8SvYrC_Ub4Jx0PaTmgqfjyv4z-DmiZ027Omr8dgcxLQyMv4sm8fDZUSBV6jVbeuxJlPaFrHveQsyM0swTtV6nqgSDXS1PC9ZtZ8gr394cJg6n4O1z6MAn1RM85q2-mKrc3YbvjNvQuS9IYbifEW2Vaw3pDadgj2Da3IFgRjWsDB"/>
<!-- Kinetic Overlay -->
<div class="absolute inset-0 bg-gradient-to-t from-primary/60 to-transparent flex flex-col justify-end p-8">
<div class="bg-surface-container-lowest/90 backdrop-blur-md p-6 rounded-2xl w-fit shadow-2xl">
<div class="flex items-center gap-3 mb-2">
<span class="material-symbols-outlined text-on-tertiary-container" style="font-variation-settings: 'FILL' 1;">payments</span>
<span class="text-label-sm font-bold text-on-tertiary-container uppercase tracking-widest font-headline">Earning Potential</span>
</div>
<div class="text-3xl font-extrabold text-primary font-headline tracking-tighter">
                        Up to $45/hr
                    </div>
</div>
</div>
</div>
<!-- Content Content -->
<div class="text-center space-y-6">
<h1 class="text-4xl md:text-5xl font-extrabold text-primary font-headline leading-[1.1] tracking-tight">
                Earn on Your <span class="text-secondary">Terms</span>.
            </h1>
<p class="text-lg text-on-surface-variant leading-relaxed max-w-md mx-auto">
                No fixed shifts. No boss. Just you, your wheels, and the road. Orchestrate your schedule with surgical precision.
            </p>
</div>
<!-- Onboarding Progress Indicators -->
<div class="flex gap-2 mt-12">
<div class="h-1.5 w-12 rounded-full bg-secondary"></div>
<div class="h-1.5 w-4 rounded-full bg-surface-variant"></div>
<div class="h-1.5 w-4 rounded-full bg-surface-variant"></div>
</div>
</main>
<!-- Fixed Action Bar -->
<div class="fixed bottom-0 w-full p-6 md:p-8 bg-surface/80 backdrop-blur-xl">
<div class="max-w-2xl mx-auto flex items-center justify-between gap-4">
<div class="hidden md:flex flex-col">
<span class="text-xs font-bold text-on-surface-variant uppercase tracking-widest font-headline">Step 01 of 03</span>
<span class="text-sm font-medium text-primary">Introduction</span>
</div>
<button class="flex-grow md:flex-none md:min-w-[200px] bg-secondary text-on-secondary py-4 px-8 rounded-xl font-bold text-lg flex items-center justify-center gap-2 hover:bg-on-secondary-fixed-variant transition-all active:scale-95 shadow-lg shadow-secondary/20">
                Next
                <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</div>
</div>
<!-- Background Decoration Elements (Subtle Momentum) -->
<div class="fixed -top-24 -right-24 w-96 h-96 bg-secondary/5 rounded-full blur-[100px] -z-10"></div>
<div class="fixed -bottom-24 -left-24 w-96 h-96 bg-tertiary-container/5 rounded-full blur-[100px] -z-10"></div>
</body></html>
