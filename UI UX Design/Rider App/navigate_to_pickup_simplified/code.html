<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-container": "#0a2342",
              "tertiary-fixed": "#ffdbcb",
              "surface-dim": "#d7dadc",
              "surface-container-highest": "#e0e3e5",
              "on-primary-fixed-variant": "#324768",
              "surface-bright": "#f7fafc",
              "outline-variant": "#c4c6cf",
              "on-tertiary-fixed-variant": "#7a3000",
              "on-secondary-container": "#efefff",
              "on-tertiary-container": "#e66100",
              "on-primary-fixed": "#021c3a",
              "primary-fixed-dim": "#b2c7ef",
              "secondary-fixed-dim": "#b8c3ff",
              "error-container": "#ffdad6",
              "error": "#ba1a1a",
              "tertiary-fixed-dim": "#ffb692",
              "on-secondary-fixed": "#001356",
              "secondary": "#0040e0",
              "secondary-container": "#2e5bff",
              "on-secondary": "#ffffff",
              "on-primary": "#ffffff",
              "on-error": "#ffffff",
              "tertiary": "#1d0600",
              "on-primary-container": "#768baf",
              "background": "#f7fafc",
              "on-surface": "#181c1e",
              "on-background": "#181c1e",
              "inverse-surface": "#2d3133",
              "on-secondary-fixed-variant": "#0035be",
              "surface-tint": "#4a5f81",
              "inverse-primary": "#b2c7ef",
              "surface-variant": "#e0e3e5",
              "on-error-container": "#93000a",
              "surface": "#f7fafc",
              "secondary-fixed": "#dde1ff",
              "surface-container-low": "#f1f4f6",
              "tertiary-container": "#401600",
              "on-tertiary-fixed": "#341100",
              "primary": "#000d22",
              "primary-fixed": "#d5e3ff",
              "outline": "#74777e",
              "on-surface-variant": "#44474e",
              "surface-container-high": "#e5e9eb",
              "surface-container": "#ebeef0",
              "inverse-on-surface": "#eef1f3",
              "surface-container-lowest": "#ffffff",
              "on-tertiary": "#ffffff"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .map-gradient-overlay {
            background: linear-gradient(to bottom, rgba(247, 250, 252, 0.6) 0%, rgba(247, 250, 252, 0) 15%, rgba(247, 250, 252, 0) 75%, rgba(247, 250, 252, 0.8) 100%);
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-secondary/30">
<!-- Top Navigation Shell -->
<header class="fixed top-0 w-full z-50 bg-white/60 dark:bg-slate-950/60 backdrop-blur-lg flex items-center justify-between px-6 h-16 w-full border-b border-black/5">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-black/5 transition-colors">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline font-bold tracking-tight text-lg text-primary">En Route</h1>
</div>
<div class="flex items-center gap-2">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-black/5 transition-colors">
<span class="material-symbols-outlined text-primary">more_vert</span>
</button>
</div>
</header>
<main class="relative h-screen w-full overflow-hidden">
<!-- Background Map Section -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover brightness-75" data-alt="Realistic satellite and hybrid view of Austin, Texas with clear street labels and topographical details." data-location="Austin, Texas" src="https://lh3.googleusercontent.com/aida-public/AGV97P8p7F3B9t9X9X9X9X9X9X9X9X9X9X9X9X9X9X9X9X9X9X9X9X9X9X9X9X9X"/>
<div class="absolute inset-0 map-gradient-overlay pointer-events-none"></div>
<!-- Route Visualization (SVG Overlay) -->
<svg class="absolute inset-0 w-full h-full pointer-events-none" preserveaspectratio="none" viewbox="0 0 1000 1000">
<path class="opacity-70" d="M 200,800 Q 400,750 500,500 T 800,200" fill="none" stroke="#0040e0" stroke-linecap="round" stroke-linejoin="round" stroke-width="6"></path>
<circle class="animate-pulse" cx="200" cy="800" fill="#0040e0" r="8"></circle>
<circle cx="800" cy="200" fill="#000d22" r="10"></circle>
</svg>
</div>
<!-- Float Map UI Elements -->
<div class="absolute top-20 left-6 z-10">
<div class="bg-surface-container-lowest/80 backdrop-blur-xl px-4 py-3 rounded-2xl shadow-sm border border-black/5 max-w-[200px]">
<p class="text-[9px] font-bold uppercase tracking-widest text-on-surface-variant mb-0.5">Pickup</p>
<h2 class="font-headline font-bold text-primary text-sm leading-tight">Whole Foods Market</h2>
</div>
</div>
<!-- Interaction Buttons (Right Side) -->
<div class="absolute right-6 bottom-48 z-10 flex flex-col gap-3">
<button class="w-12 h-12 bg-white/90 backdrop-blur-md rounded-full shadow-md flex items-center justify-center hover:bg-white transition-all active:scale-95 border border-black/5">
<span class="material-symbols-outlined text-primary text-xl">my_location</span>
</button>
<button class="w-12 h-12 bg-white/90 backdrop-blur-md rounded-full shadow-md flex items-center justify-center hover:bg-white transition-all active:scale-95 border border-black/5">
<span class="material-symbols-outlined text-primary text-xl">layers</span>
</button>
</div>
<!-- Bottom Simplified Task Detail Card -->
<div class="absolute bottom-24 left-6 right-6 z-20">
<div class="bg-white p-5 rounded-[1.5rem] shadow-xl max-w-lg mx-auto border border-black/5 flex flex-col gap-5">
<div class="flex justify-between items-center">
<div>
<div class="flex items-center gap-1.5 mb-0.5">
<span class="w-1.5 h-1.5 rounded-full bg-secondary"></span>
<span class="font-headline font-bold text-secondary text-[10px] uppercase tracking-wider">Heading to Pickup</span>
</div>
<h3 class="font-headline font-extrabold text-xl text-primary">Whole Foods Market</h3>
<p class="text-on-surface-variant text-xs font-medium">525 N Lamar Blvd • Station B12</p>
</div>
<div class="text-right">
<p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-tighter mb-0.5">ETA</p>
<p class="font-headline font-extrabold text-lg text-primary">8 mins</p>
</div>
</div>
<!-- Simple Stats Row -->
<div class="flex items-center gap-6 border-t border-black/5 pt-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant text-lg">inventory_2</span>
<span class="text-xs font-semibold text-primary">3 Orders</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-secondary text-lg" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="text-xs font-semibold text-primary">Express</span>
</div>
</div>
<!-- Unified Action Button -->
<button class="w-full bg-secondary text-white font-headline font-bold py-3.5 rounded-xl hover:bg-secondary-container transition-all shadow-md active:scale-[0.98] flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl">near_me</span>
<span>OPEN NAVIGATION</span>
</button>
</div>
</div>
</main>
<!-- Bottom Navigation Shell -->
<nav class="md:hidden fixed bottom-0 w-full z-50 bg-white border-t border-black/5 flex justify-around items-center h-20 px-6 pb-safe">
<a class="flex flex-col items-center justify-center text-secondary" href="#">
<span class="material-symbols-outlined text-2xl mb-1" style="font-variation-settings: 'FILL' 1;">near_me</span>
<span class="font-headline text-[10px] font-bold uppercase tracking-widest">Navigate</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-secondary transition-colors" href="#">
<span class="material-symbols-outlined text-2xl mb-1">inventory_2</span>
<span class="font-headline text-[10px] font-bold uppercase tracking-widest">Orders</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-secondary transition-colors" href="#">
<span class="material-symbols-outlined text-2xl mb-1">person</span>
<span class="font-headline text-[10px] font-bold uppercase tracking-widest">Profile</span>
</a>
</nav>
</body></html>
