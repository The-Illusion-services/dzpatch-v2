<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

              "on-tertiary-fixed": "#341100",
              "surface-dim": "#d7dadc",
              "on-error-container": "#93000a",
              "inverse-primary": "#b2c7ef",
              "on-tertiary-container": "#e66100",
              "on-primary-container": "#768baf",
              "on-primary": "#ffffff",
              "on-background": "#181c1e",
              "background": "#f7fafc",
              "surface-container": "#ebeef0",
              "secondary-fixed": "#dde1ff",
              "inverse-on-surface": "#eef1f3",
              "error": "#ba1a1a",
              "secondary": "#0040e0",
              "secondary-fixed-dim": "#b8c3ff",
              "surface": "#f7fafc",
              "on-tertiary": "#ffffff",
              "tertiary-fixed-dim": "#ffb692",
              "surface-container-high": "#e5e9eb",
              "on-secondary": "#ffffff",
              "surface-container-lowest": "#ffffff",
              "primary-fixed": "#d5e3ff",

              "on-surface": "#181c1e",
              "tertiary-fixed": "#ffdbcb"

            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .radar-pulse {
            animation: radar-expand 3s cubic-bezier(0, 0.2, 0.8, 1) infinite;
        }
        @keyframes radar-expand {
            0% { transform: scale(0.5); opacity: 0.8; }
            100% { transform: scale(3.5); opacity: 0; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-background antialiased overflow-hidden">
<!-- TopAppBar -->
<nav class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 w-full bg-slate-50/70 dark:bg-slate-950/70 backdrop-blur-md shadow-sm shadow-blue-900/5">
<div class="flex items-center gap-4">
<button class="text-blue-700 dark:text-blue-500 hover:bg-slate-200/50 dark:hover:bg-slate-800/50 transition-colors active:scale-95 duration-200 p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Manrope'] font-black text-slate-900 dark:text-slate-50 text-lg tracking-tight">Bidding Terminal</h1>
</div>
<button class="text-slate-500 dark:text-slate-400 hover:bg-slate-200/50 dark:hover:bg-slate-800/50 transition-colors active:scale-95 duration-200 p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</nav>
<!-- Main Canvas -->
<main class="relative h-screen w-full flex flex-col pt-16">
<!-- Map Background with Radar -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover filter grayscale contrast-125 opacity-40" data-alt="Minimalist top-down city map in shades of cool blue and grey with glowing arterial roads and high contrast logistics aesthetic" data-location="Chicago" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCgEkekGitMHn7DVLZKlEv0l3qEIM5s4Ct-3BPgYmXvYLF-dUZlIp0_NQxIMH_w517POoYOJNWYg10-LYqaVbVbrLWvs0J_bHy7s7yZ7Z87EdDmr8mK3R43q7K8jk_GuitPlmIu7KjEIiRu41EQNJ2VAKhywyX0EjlSwuPb8Rn4CMqDsjVBoxqOWxrImaclVSAn3XrWv0j2YaXcbbRsxnjmXQbPWRnF9Rsh_5MBnu3yKSIPuACKq3ZyZ_A_iGDEVvolnB5kwaZBsrxm"/>
<div class="absolute inset-0 bg-gradient-to-b from-background via-transparent to-background/90"></div>
<!-- Radar Center Point -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex items-center justify-center">
<div class="absolute w-24 h-24 border-2 border-secondary/30 rounded-full radar-pulse"></div>
<div class="absolute w-24 h-24 border-2 border-secondary/20 rounded-full radar-pulse" style="animation-delay: 1s;"></div>
<div class="absolute w-24 h-24 border-2 border-secondary/10 rounded-full radar-pulse" style="animation-delay: 2s;"></div>
<div class="relative w-16 h-16 bg-secondary flex items-center justify-center rounded-full shadow-[0_0_30px_rgba(0,64,224,0.4)] z-10 border-4 border-surface-container-lowest">
<span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings: 'FILL' 1;">local_shipping</span>
</div>
</div>
</div>
<!-- Content Overlay -->
<div class="relative z-10 flex-1 flex flex-col justify-end px-6 pb-32">
<!-- Bento Status Card -->
<div class="bg-surface-container-lowest/80 backdrop-blur-xl rounded-full p-8 shadow-sm border border-outline-variant/15 max-w-2xl mx-auto w-full">
<div class="flex flex-col md:flex-row items-center justify-between gap-6">
<div class="flex flex-col gap-1 text-center md:text-left">
<span class="font-label text-on-tertiary-container bg-tertiary-fixed px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider inline-flex items-center gap-2 w-fit mx-auto md:mx-0">
<span class="w-2 h-2 rounded-full bg-on-tertiary-container animate-pulse"></span>
                            Live Bid
                        </span>
<h2 class="font-headline text-2xl font-extrabold text-primary mt-2">Waiting for customer response...</h2>
<p class="font-body text-on-surface-variant text-sm">Your offer of <span class="font-bold text-secondary">$145.00</span> for the Westside Delivery is pending.</p>
</div>
<div class="flex items-center gap-4 bg-surface-container-low p-4 rounded-xl">
<div class="flex flex-col items-center">
<span class="text-xs font-bold text-on-surface-variant/60 uppercase">ETA</span>
<span class="text-xl font-bold font-headline text-primary">12m</span>
</div>
<div class="w-px h-8 bg-outline-variant"></div>
<div class="flex flex-col items-center">
<span class="text-xs font-bold text-on-surface-variant/60 uppercase">Dist</span>
<span class="text-xl font-bold font-headline text-primary">4.2mi</span>
</div>
</div>
</div>
<!-- Progress Line -->
<div class="mt-8 h-1 w-full bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-secondary to-secondary-fixed w-1/3 rounded-full shadow-[0_0_10px_rgba(0,64,224,0.3)]"></div>
</div>
</div>
<!-- Cancel Action -->
<div class="mt-8 flex justify-center">
<button class="group flex items-center gap-2 px-8 py-4 rounded-xl text-on-surface-variant font-bold hover:bg-surface-container-high transition-all active:translate-y-0.5">
<span class="material-symbols-outlined text-error/80 group-hover:text-error transition-colors" data-icon="cancel">cancel</span>
                    Cancel Bid
                </button>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-white dark:bg-slate-900 rounded-t-3xl shadow-[0_-4px_20px_rgba(0,13,34,0.06)] border-t border-slate-100 dark:border-slate-800">
<!-- Bids -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 py-2 px-4 hover:text-blue-500 dark:hover:text-blue-300 active:translate-y-0.5 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="gavel">gavel</span>
<span class="font-['Inter'] font-medium text-[10px] uppercase tracking-widest mt-1">Bids</span>
</a>
<!-- Active -->
<a class="flex flex-col items-center justify-center bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400 rounded-xl py-2 px-4 active:translate-y-0.5 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="local_shipping" style="font-variation-settings: 'FILL' 1;">local_shipping</span>
<span class="font-['Inter'] font-medium text-[10px] uppercase tracking-widest mt-1">Active</span>
</a>
<!-- History -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 py-2 px-4 hover:text-blue-500 dark:hover:text-blue-300 active:translate-y-0.5 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-['Inter'] font-medium text-[10px] uppercase tracking-widest mt-1">History</span>
</a>
<!-- Profile -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 py-2 px-4 hover:text-blue-500 dark:hover:text-blue-300 active:translate-y-0.5 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Inter'] font-medium text-[10px] uppercase tracking-widest mt-1">Profile</span>
</a>
</nav>
</body></html>
