<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dzpatch Chat - John D.</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-fixed-dim": "#b2c7ef",
              "on-primary-container": "#768baf",
              "surface-container-highest": "#e0e3e5",
              "surface-variant": "#e0e3e5",
              "tertiary-container": "#401600",
              "secondary-fixed-dim": "#b8c3ff",
              "on-primary": "#ffffff",
              "surface-container-low": "#f1f4f6",
              "surface-bright": "#f7fafc",
              "on-tertiary-fixed-variant": "#7a3000",
              "outline-variant": "#c4c6cf",
              "secondary-fixed": "#dde1ff",
              "on-tertiary-fixed": "#341100",
              "surface": "#f7fafc",
              "primary": "#000d22",
              "inverse-surface": "#2d3133",
              "secondary": "#0040e0",
              "primary-container": "#0a2342",
              "on-primary-fixed": "#021c3a",
              "inverse-primary": "#b2c7ef",
              "on-secondary-fixed-variant": "#0035be",
              "inverse-on-surface": "#eef1f3",
              "surface-tint": "#4a5f81",
              "on-tertiary": "#ffffff",
              "on-secondary": "#ffffff",
              "background": "#f7fafc",
              "on-surface": "#181c1e",
              "on-surface-variant": "#44474e",
              "on-background": "#181c1e",
              "surface-dim": "#d7dadc",
              "primary-fixed": "#d5e3ff",
              "surface-container-lowest": "#ffffff",
              "error-container": "#ffdad6",
              "outline": "#74777e",
              "on-secondary-container": "#efefff",
              "tertiary-fixed-dim": "#ffb692",
              "surface-container-high": "#e5e9eb",
              "on-tertiary-container": "#e66100",
              "on-secondary-fixed": "#001356",
              "on-primary-fixed-variant": "#324768",
              "on-error": "#ffffff",
              "on-error-container": "#93000a",
              "tertiary-fixed": "#ffdbcb",
              "secondary-container": "#2e5bff",
              "tertiary": "#1d0600",
              "surface-container": "#ebeef0",
              "error": "#ba1a1a"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "2xl": "1rem", "3xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f7fafc;
      }
      h1, h2, h3, .font-manrope {
        font-family: 'Manrope', sans-serif;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface flex flex-col min-h-screen">
<!-- Floating Header Card -->
<header class="fixed top-4 left-4 right-4 z-50 max-w-2xl mx-auto">
<div class="bg-white/95 backdrop-blur-2xl rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 p-5 flex items-center justify-between">
<div class="flex items-center gap-5">
<button class="flex items-center justify-center w-8 h-8 rounded-full hover:bg-slate-50 transition-colors text-slate-400 -ml-1">
<span class="material-symbols-outlined text-xl" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex items-center gap-4">
<div class="relative flex-shrink-0">
<img alt="John D. Profile" class="w-16 h-16 rounded-full object-cover border-2 border-white shadow-md" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAmGdFGkDAqzI5h579Lr7erLXxkh40V6ZxHovVBcI5h2aOgN86fO_WpOCKRLzBH_oVJ2DIYSoLL8E5xCzn3wzSGDBNqw80xDxchUeKJve_kMolWTEaT79WQmoCKZxvSXB2RSWyVlHRUTlKE9R_iFfLqOMHTMY82E-Q_31lXmiFcB9xFEvbleSrhdZAqumaVVoOq8HtpvLXkOtncOymL14R1WnlvxKWcfoUkGfywP4Psrverxbdt4Qkh0Up9onD7pSPlBA1HCSrb864L"/>
<div class="absolute bottom-0 right-1 w-4 h-4 bg-green-500 border-2 border-white rounded-full"></div>
</div>
<div class="flex flex-col gap-1">
<h1 class="font-manrope font-extrabold text-slate-900 leading-tight text-xl tracking-tight">John D.</h1>
<p class="text-[11px] text-slate-500 font-bold uppercase tracking-widest leading-none">Blue Honda • ABC-123</p>
<div class="mt-1">
<span class="bg-slate-50 text-slate-500 text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-widest border border-slate-100">Heading to Pick-up</span>
</div>
</div>
</div>
</div>
<button class="flex items-center justify-center w-14 h-14 rounded-2xl bg-slate-50 hover:bg-blue-50 text-blue-600 transition-all active:scale-95 border border-slate-100/80">
<span class="material-symbols-outlined text-2xl" data-icon="call">call</span>
</button>
</div>
</header>
<!-- Main Chat Canvas -->
<main class="flex-grow pt-44 pb-32 px-6 max-w-2xl mx-auto w-full flex flex-col gap-6">
<!-- Date Indicator -->
<div class="flex justify-center my-6">
<span class="text-on-surface-variant/40 font-label text-[10px] font-bold uppercase tracking-[0.2em]">Today</span>
</div>
<!-- Rider Message (Left) -->
<div class="flex flex-col items-start max-w-[85%]">
<div class="bg-surface-container-high text-on-surface p-4 rounded-2xl rounded-tl-none shadow-sm">
<p class="font-body text-[14px] leading-relaxed">Hello, I'm at the pick-up point.</p>
</div>
<div class="mt-2 flex items-center gap-2 px-1">
<span class="text-[10px] text-on-surface-variant/70 font-label font-medium">14:02</span>
</div>
</div>
<!-- Customer Message (Right) -->
<div class="flex flex-col items-end max-w-[85%] ml-auto">
<div class="bg-secondary text-on-secondary p-4 rounded-2xl rounded-tr-none shadow-md shadow-blue-100">
<p class="font-body text-[14px] leading-relaxed">Great, I'll be there in a minute.</p>
</div>
<div class="mt-2 flex items-center gap-2 px-1">
<span class="text-[10px] text-on-surface-variant/70 font-label font-medium">14:03</span>
<span class="material-symbols-outlined text-secondary text-xs" style="font-variation-settings: 'FILL' 1;">done_all</span>
</div>
</div>
<!-- System Notification -->
<div class="mt-8 p-5 bg-surface-container-low/50 rounded-2xl border-l-4 border-secondary/20">
<div class="flex items-start gap-3">
<span class="material-symbols-outlined text-secondary text-base">info</span>
<p class="text-[12px] text-on-surface-variant font-medium leading-relaxed">
        Rider is currently waiting at the location. Standard wait time is 5 minutes.
      </p>
</div>
</div>
</main>
<!-- Bottom Input Bar -->
<footer class="fixed bottom-0 w-full z-50 bg-white/80 backdrop-blur-xl px-6 py-8 max-w-2xl left-1/2 -translate-x-1/2">
<div class="flex items-center gap-4 bg-slate-100/80 p-2 rounded-full border border-slate-50">
<button class="flex items-center justify-center w-11 h-11 rounded-full text-slate-500 hover:bg-white hover:shadow-sm transition-all">
<span class="material-symbols-outlined" data-icon="attach_file">attach_file</span>
</button>
<input class="flex-grow bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-slate-400 font-body text-sm px-2" placeholder="Type a message..." type="text"/>
<button class="flex items-center justify-center w-11 h-11 bg-secondary text-on-secondary rounded-full shadow-lg shadow-blue-200 active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="send" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
</div>
</footer>
</body></html>
