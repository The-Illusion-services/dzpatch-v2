<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Shipment | Dzpatch</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

              "surface-dim": "#d7dadc",

              "inverse-primary": "#b2c7ef",
              "outline": "#74777e",
              "tertiary-fixed": "#ffdbcb",

              "on-secondary-fixed": "#001356",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface selection:bg-secondary/30">
<!-- Top Navigation Bar -->
<nav class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 w-full bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl shadow-sm shadow-blue-900/5">
<div class="flex items-center gap-4">
<button class="p-2 text-blue-700 dark:text-blue-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors active:scale-95 duration-200 rounded-full">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-manrope font-bold text-lg tracking-tight text-slate-900 dark:text-slate-100">Create Shipment</h1>
</div>
<div class="flex gap-2">
<button class="p-2 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors rounded-full">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="pt-20 pb-32 px-6 max-w-2xl mx-auto space-y-8">
<!-- Locations Section -->
<section class="space-y-4">
<div class="flex items-center justify-between">
<h2 class="font-headline font-bold text-sm uppercase tracking-widest text-on-surface-variant">Locations</h2>
</div>
<div class="bg-surface-container-low rounded-2xl p-5 space-y-6 relative overflow-hidden">
<!-- Visual Connection Line -->
<div class="absolute left-9 top-14 bottom-14 w-0.5 border-l-2 border-dashed border-outline-variant/30"></div>
<!-- From Address -->
<div class="relative flex items-start gap-4 z-10">
<div class="mt-3 flex-none h-4 w-4 rounded-full border-2 border-secondary bg-white"></div>
<div class="flex-1 space-y-2">
<label class="block font-label text-[10px] font-bold uppercase text-secondary tracking-tighter">FROM</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-none rounded-xl py-3 px-4 text-sm font-medium focus:ring-2 focus:ring-secondary/20 placeholder:text-outline shadow-sm transition-all" placeholder="Search pick-up address..." type="text"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary">
<span class="material-symbols-outlined text-sm" data-icon="close">close</span>
</button>
</div>
</div>
</div>
<!-- To Address -->
<div class="relative flex items-start gap-4 z-10">
<div class="mt-3 flex-none h-4 w-4 rounded-full bg-primary-container flex items-center justify-center">
<div class="h-1.5 w-1.5 rounded-full bg-white"></div>
</div>
<div class="flex-1 space-y-2">
<label class="block font-label text-[10px] font-bold uppercase text-on-surface-variant tracking-tighter">TO</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-none rounded-xl py-3 px-4 text-sm font-medium focus:ring-2 focus:ring-secondary/20 placeholder:text-outline shadow-sm transition-all" placeholder="Where is it going?" type="text"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary">
<span class="material-symbols-outlined text-sm" data-icon="close">close</span>
</button>
</div>
</div>
</div>
<!-- Quick Suggestions -->
<div class="flex gap-2 overflow-x-auto hide-scrollbar pt-2">
<button class="flex items-center gap-2 px-3 py-1.5 bg-secondary-fixed/30 text-on-secondary-fixed-variant rounded-full text-xs font-semibold whitespace-nowrap hover:bg-secondary-fixed/50 transition-colors">
<span class="material-symbols-outlined text-[16px]" data-icon="my_location">my_location</span>
                        Current Location
                    </button>
<button class="flex items-center gap-2 px-3 py-1.5 bg-surface-container-high text-on-surface-variant rounded-full text-xs font-semibold whitespace-nowrap hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-[16px]" data-icon="history">history</span>
                        Recent: Lekki Phase 1
                    </button>
</div>
</div>
</section>
<!-- Recipient Details -->
<section class="space-y-4">
<h2 class="font-headline font-bold text-sm uppercase tracking-widest text-on-surface-variant">Recipient</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-2">
<label class="block font-label text-xs font-semibold text-on-surface-variant ml-1">Full Name</label>
<input class="w-full bg-surface-container-high border-none rounded-xl py-4 px-4 text-sm font-medium focus:ring-2 focus:ring-secondary/20 transition-all" placeholder="John Doe" type="text"/>
</div>
<div class="space-y-2">
<label class="block font-label text-xs font-semibold text-on-surface-variant ml-1">Phone Number</label>
<input class="w-full bg-surface-container-high border-none rounded-xl py-4 px-4 text-sm font-medium focus:ring-2 focus:ring-secondary/20 transition-all" placeholder="+234 --- --- ----" type="tel"/>
</div>
</div>
</section>
<!-- Package Details -->
<section class="space-y-6">
<h2 class="font-headline font-bold text-sm uppercase tracking-widest text-on-surface-variant">Package Details</h2>
<!-- Type Selector -->
<div class="space-y-3">
<label class="block font-label text-xs font-semibold text-on-surface-variant ml-1">Category</label>
<div class="grid grid-cols-4 gap-3">
<button class="flex flex-col items-center justify-center gap-2 p-4 bg-primary-container text-white rounded-2xl transition-all shadow-md active:scale-95">
<span class="material-symbols-outlined text-2xl" data-icon="restaurant">restaurant</span>
<span class="text-[10px] font-bold uppercase tracking-tight">Food</span>
</button>
<button class="flex flex-col items-center justify-center gap-2 p-4 bg-surface-container-low text-on-surface-variant rounded-2xl transition-all hover:bg-surface-container-high active:scale-95">
<span class="material-symbols-outlined text-2xl" data-icon="description">description</span>
<span class="text-[10px] font-bold uppercase tracking-tight">Docs</span>
</button>
<button class="flex flex-col items-center justify-center gap-2 p-4 bg-surface-container-low text-on-surface-variant rounded-2xl transition-all hover:bg-surface-container-high active:scale-95">
<span class="material-symbols-outlined text-2xl" data-icon="package_2">package_2</span>
<span class="text-[10px] font-bold uppercase tracking-tight">Parcel</span>
</button>
<button class="flex flex-col items-center justify-center gap-2 p-4 bg-surface-container-low text-on-surface-variant rounded-2xl transition-all hover:bg-surface-container-high active:scale-95">
<span class="material-symbols-outlined text-2xl" data-icon="checkroom">checkroom</span>
<span class="text-[10px] font-bold uppercase tracking-tight">Fashion</span>
</button>
</div>
</div>
<!-- Size Selector -->
<div class="space-y-3">
<label class="block font-label text-xs font-semibold text-on-surface-variant ml-1">Size Estimate</label>
<div class="flex p-1 bg-surface-container-high rounded-xl">
<button class="flex-1 py-3 text-xs font-bold uppercase tracking-widest bg-white text-primary rounded-lg shadow-sm">Small</button>
<button class="flex-1 py-3 text-xs font-bold uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors">Medium</button>
<button class="flex-1 py-3 text-xs font-bold uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors">Large</button>
</div>
</div>
<!-- Security Toggle -->
<div class="flex items-center justify-between p-4 bg-surface-container-low rounded-2xl">
<div class="flex items-center gap-4">
<div class="h-10 w-10 bg-tertiary-fixed rounded-full flex items-center justify-center text-on-tertiary-fixed-variant">
<span class="material-symbols-outlined" data-icon="lock_reset">lock_reset</span>
</div>
<div>
<h4 class="text-sm font-bold text-primary">Require Delivery Code</h4>
<p class="text-xs text-on-surface-variant">Rider must enter 4-digit code to finish</p>
</div>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-outline-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-secondary"></div>
</label>
</div>
</section>
<!-- Promotions -->
<section class="space-y-3">
<label class="block font-label text-xs font-semibold text-on-surface-variant ml-1">Promotions</label>
<div class="flex gap-2">
<div class="relative flex-1">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-lg" data-icon="confirmation_number">confirmation_number</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 pl-12 pr-4 text-sm font-medium focus:ring-2 focus:ring-secondary/20 transition-all uppercase placeholder:normal-case" placeholder="Promo code" type="text"/>
</div>
<button class="px-6 bg-primary-container text-white text-sm font-bold rounded-xl active:scale-95 transition-all">Apply</button>
</div>
</section>
<!-- Pricing Summary -->
<section class="bg-primary-container text-white p-6 rounded-3xl space-y-4 shadow-xl shadow-primary-container/20">
<div class="flex justify-between items-center text-sm opacity-80">
<span>Delivery Fee</span>
<span class="font-mono">₦2,400.00</span>
</div>
<div class="flex justify-between items-center text-sm opacity-80">
<span>Service &amp; Tax</span>
<span class="font-mono">₦150.00</span>
</div>
<div class="pt-4 border-t border-white/10 flex justify-between items-end">
<div>
<span class="block text-[10px] font-bold uppercase tracking-widest text-secondary-fixed-dim">Total Payable</span>
<span class="text-2xl font-headline font-extrabold tracking-tight">₦2,550.00</span>
</div>
<span class="material-symbols-outlined text-tertiary-fixed text-3xl" data-icon="bolt" data-weight="fill" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
</section>
</main>
<!-- Bottom Navigation Bar -->
<div class="fixed bottom-0 left-0 w-full z-50 flex justify-between items-center px-4 pb-12 pt-4 bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800 shadow-[0_-4px_20px_0_rgba(0,13,34,0.06)] rounded-t-3xl">
<button class="flex flex-1 items-center justify-center text-slate-500 dark:text-slate-400 py-4 hover:opacity-90 transition-opacity active:scale-[0.98] duration-150">
<span class="material-symbols-outlined mr-2" data-icon="save">save</span>
<span class="font-inter font-semibold text-sm">Save Draft</span>
</button>
<button class="flex flex-[2] items-center justify-center bg-blue-600 text-white rounded-2xl py-4 mx-2 my-1 hover:opacity-90 transition-opacity active:scale-[0.98] duration-150 shadow-lg shadow-blue-600/20">
<span class="material-symbols-outlined mr-2" data-icon="bolt">bolt</span>
<span class="font-inter font-semibold text-sm">Find Rider - ₦2,550.00</span>
</button>
</div>
</body></html>
