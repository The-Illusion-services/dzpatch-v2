<body class="bg-surface font-body text-on-surface antialiased overflow-hidden">

</div>
</div>

<div class="flex items-center gap-3">
<div class="w-2 h-2 rounded-full bg-on-tertiary-container"></div>
<div>

</div>

</div>
</div>

<div class="flex gap-2 mb-2">
<div class="h-1 w-4 rounded-full bg-surface-variant"></div>

</div>

<div class="fixed top-20 right-0 -z-10 w-96 h-96 bg-secondary-fixed/30 rounded-full blur-[120px]"></div>
