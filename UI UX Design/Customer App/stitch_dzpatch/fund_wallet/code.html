<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container": "#ebeef0",
              "secondary-container": "#2e5bff",
              "surface-container-low": "#f1f4f6",
              "surface-container-high": "#e5e9eb",
              "on-tertiary-fixed": "#341100",
              "tertiary-container": "#401600",
              "on-tertiary": "#ffffff",
              "on-primary-fixed-variant": "#324768",
              "on-secondary-container": "#efefff",
              "outline-variant": "#c4c6cf",
              "secondary": "#0040e0",
              "surface-container-lowest": "#ffffff",
              "on-surface": "#181c1e",
              "on-secondary-fixed": "#001356",
              "on-tertiary-container": "#e66100",
              "on-surface-variant": "#44474e",
              "surface-dim": "#d7dadc",
              "inverse-surface": "#2d3133",
              "primary-fixed-dim": "#b2c7ef",
              "tertiary-fixed-dim": "#ffb692",
              "surface": "#f7fafc",
              "on-secondary": "#ffffff",
              "error-container": "#ffdad6",
              "on-error-container": "#93000a",
              "on-primary": "#ffffff",
              "on-tertiary-fixed-variant": "#7a3000",
              "on-background": "#181c1e",
              "on-error": "#ffffff",
              "on-primary-container": "#768baf",
              "primary": "#000d22",
              "secondary-fixed-dim": "#b8c3ff",
              "background": "#f7fafc",
              "surface-tint": "#4a5f81",
              "error": "#ba1a1a",
              "primary-container": "#0a2342",
              "inverse-primary": "#b2c7ef",
              "outline": "#74777e",
              "secondary-fixed": "#dde1ff",
              "tertiary-fixed": "#ffdbcb",
              "on-primary-fixed": "#021c3a",
              "surface-bright": "#f7fafc",
              "primary-fixed": "#d5e3ff",
              "surface-container-highest": "#e0e3e5",
              "tertiary": "#1d0600",
              "on-secondary-fixed-variant": "#0035be",
              "inverse-on-surface": "#eef1f3",
              "surface-variant": "#e0e3e5"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
<!-- Top Navigation Anchor (Shared Component: TopAppBar) -->
<header class="bg-white/70 backdrop-blur-xl fixed top-0 w-full z-50 shadow-sm">
<div class="flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center gap-4">
<button class="text-blue-700 active:scale-95 duration-200 hover:bg-slate-100 p-2 rounded-full transition-colors">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-manrope font-bold text-lg tracking-tight text-slate-900">Fund Wallet</h1>
</div>
<div class="text-blue-700">
<span class="material-symbols-outlined" data-icon="account_balance_wallet">account_balance_wallet</span>
</div>
</div>
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto space-y-8">
<!-- Current Balance Section (Asymmetric Momentum) -->
<section class="bg-primary-container text-white p-8 rounded-[2rem] relative overflow-hidden">
<div class="relative z-10">
<p class="text-on-primary-container font-medium text-sm tracking-widest uppercase mb-2">Available Balance</p>
<div class="flex items-baseline gap-2">
<span class="text-2xl font-bold opacity-70">₦</span>
<h2 class="text-4xl md:text-5xl font-extrabold tracking-tight">142,850.00</h2>
</div>
</div>
<!-- Kinetic Pattern Background -->
<div class="absolute top-0 right-0 -mr-16 -mt-16 w-64 h-64 bg-secondary/20 rounded-full blur-3xl"></div>
<div class="absolute bottom-0 left-0 -ml-8 -mb-8 w-32 h-32 bg-secondary-container/10 rounded-full blur-2xl"></div>
</section>
<!-- Amount Input Field -->
<section class="space-y-4">
<label class="block text-on-surface-variant font-semibold text-sm px-1">Amount to Add</label>
<div class="relative group">
<div class="absolute inset-y-0 left-6 flex items-center pointer-events-none">
<span class="text-xl font-bold text-secondary">₦</span>
</div>
<input class="w-full bg-surface-container-highest border-none rounded-2xl py-6 pl-12 pr-6 text-2xl font-bold text-primary focus:ring-0 focus:outline-none placeholder:text-outline transition-all duration-300" placeholder="0.00" type="number"/>
<div class="absolute bottom-0 left-0 right-0 h-1 bg-transparent group-focus-within:bg-tertiary-fixed transition-colors duration-300 rounded-b-2xl"></div>
</div>
</section>
<!-- Payment Methods (Bento-style selection) -->
<section class="space-y-4">
<h3 class="text-on-surface font-bold text-lg px-1">Payment Method</h3>
<div class="grid grid-cols-1 gap-3">
<!-- Method 1: Card -->
<button class="flex items-center justify-between p-5 bg-surface-container-lowest rounded-2xl border-2 border-secondary group active:scale-[0.98] transition-all">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-xl bg-secondary-fixed flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" data-icon="credit_card">credit_card</span>
</div>
<div class="text-left">
<p class="font-bold text-primary">Credit / Debit Card</p>
<p class="text-xs text-on-surface-variant font-medium">MasterCard, Visa, Verve</p>
</div>
</div>
<span class="material-symbols-outlined text-secondary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<!-- Method 2: Bank Transfer -->
<div class="bg-surface-container-low rounded-2xl overflow-hidden transition-all duration-300">
<button class="w-full flex items-center justify-between p-5 active:bg-surface-container-high transition-colors">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-xl bg-surface-container-highest flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="account_balance">account_balance</span>
</div>
<div class="text-left">
<p class="font-bold text-primary">Bank Transfer</p>
<p class="text-xs text-on-surface-variant font-medium">Automated virtual account</p>
</div>
</div>
<span class="material-symbols-outlined text-outline" data-icon="radio_button_unchecked">radio_button_unchecked</span>
</button>
<!-- Virtual Account Details (Subtle shift background) -->
<div class="px-5 pb-5 pt-2">
<div class="bg-white p-4 rounded-xl space-y-3 border border-outline-variant/20">
<div class="flex justify-between items-center">
<span class="text-xs text-on-surface-variant uppercase tracking-wider font-semibold">Bank Name</span>
<span class="text-sm font-bold text-primary">Wema Bank / Dzpatch</span>
</div>
<div class="flex justify-between items-center">
<span class="text-xs text-on-surface-variant uppercase tracking-wider font-semibold">Account Number</span>
<div class="flex items-center gap-2">
<span class="text-sm font-bold text-primary">8234009122</span>
<button class="text-secondary active:scale-90 transition-transform">
<span class="material-symbols-outlined text-sm" data-icon="content_copy">content_copy</span>
</button>
</div>
</div>
</div>
</div>
</div>
<!-- Method 3: USSD -->
<button class="flex items-center justify-between p-5 bg-surface-container-low rounded-2xl active:bg-surface-container-high transition-all">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-xl bg-surface-container-highest flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="dialpad">dialpad</span>
</div>
<div class="text-left">
<p class="font-bold text-primary">USSD Code</p>
<p class="text-xs text-on-surface-variant font-medium">Pay using your bank's code</p>
</div>
</div>
<span class="material-symbols-outlined text-outline" data-icon="radio_button_unchecked">radio_button_unchecked</span>
</button>
</div>
</section>
<!-- Security Note -->
<div class="flex items-center justify-center gap-2 text-on-surface-variant">
<span class="material-symbols-outlined text-sm" data-icon="lock">lock</span>
<p class="text-[10px] font-medium tracking-wide uppercase">Secured by 256-bit encryption</p>
</div>
</main>
<!-- Fixed Action Area (No-Border separation using shadow) -->
<div class="fixed bottom-0 left-0 right-0 p-6 bg-white/80 backdrop-blur-xl shadow-[0_-10px_30px_rgba(0,13,34,0.05)] z-50">
<div class="max-w-2xl mx-auto">
<button class="w-full bg-secondary text-white py-5 rounded-xl font-bold text-lg hover:brightness-110 active:scale-95 transition-all shadow-lg shadow-secondary/20">
                Proceed to Pay
            </button>
</div>
</div>
<!-- Bottom Navigation Component (Shared Component: BottomNavBar) -->
<!-- Suppressed due to Transactional Focus ("Proceed to Pay" takes priority) -->
</body></html>
