<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-tint": "#4a5f81",
              "on-error-container": "#93000a",
              "secondary-container": "#2e5bff",
              "on-secondary-fixed-variant": "#0035be",
              "error": "#ba1a1a",
              "surface-container-lowest": "#ffffff",
              "tertiary-fixed-dim": "#ffb692",
              "surface-dim": "#d7dadc",
              "on-primary-fixed": "#021c3a",
              "on-tertiary-fixed-variant": "#7a3000",
              "on-tertiary": "#ffffff",
              "on-primary-fixed-variant": "#324768",
              "surface-container-low": "#f1f4f6",
              "outline-variant": "#c4c6cf",
              "primary": "#000d22",
              "on-primary-container": "#768baf",
              "on-secondary-fixed": "#001356",
              "secondary": "#0040e0",
              "on-tertiary-fixed": "#341100",
              "surface-container-high": "#e5e9eb",
              "secondary-fixed-dim": "#b8c3ff",
              "on-surface": "#181c1e",
              "tertiary-fixed": "#ffdbcb",
              "inverse-primary": "#b2c7ef",
              "surface-bright": "#f7fafc",
              "primary-fixed-dim": "#b2c7ef",
              "secondary-fixed": "#dde1ff",
              "on-primary": "#ffffff",
              "inverse-on-surface": "#eef1f3",
              "outline": "#74777e",
              "on-secondary-container": "#efefff",
              "on-error": "#ffffff",
              "error-container": "#ffdad6",
              "on-surface-variant": "#44474e",
              "primary-container": "#0a2342",
              "background": "#f7fafc",
              "surface-container-highest": "#e0e3e5",
              "surface": "#f7fafc",
              "tertiary": "#1d0600",
              "surface-container": "#ebeef0",
              "primary-fixed": "#d5e3ff",
              "on-tertiary-container": "#e66100",
              "tertiary-container": "#401600",
              "surface-variant": "#e0e3e5",
              "on-background": "#181c1e",
              "inverse-surface": "#2d3133",
              "on-secondary": "#ffffff"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .map-gradient-overlay {
            background: linear-gradient(to bottom, rgba(0,13,34,0.1) 0%, rgba(247,250,252,1) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface selection:bg-secondary/20 overflow-hidden">
<!-- TopAppBar -->
<nav class="fixed top-0 w-full z-50 bg-slate-50/70 backdrop-blur-xl flex items-center justify-between px-6 h-16 w-full shadow-sm shadow-blue-900/5">
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-200/50 transition-colors active:scale-95 duration-200 text-blue-900">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-manrope font-bold text-lg tracking-tight text-blue-900">Add Address</h1>
</div>
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden">
<img class="w-full h-full object-cover" data-alt="User profile avatar portrait" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCzoSnIDmr2sdj1Gs5ovmyH7qaumVJ4H3O0B4cDsyVmxuWp12mFzWdf9zI7F4i4B9G35tG9YJWNa7UgbMZXkH1f9kYsPwSrnlp7t5AQUMIfHlL3PmjQWjuorr57eZd5R-bpE_HzcKyh0YZ2lwf0a_gt5-88n70XRFeVSz3DGq3vLr7Rs01imaz8Xakz0Mwvs8O-giL5zyDOhMrBEvr2uTfLnVEgrnrBuxS2EzyBDGnVcOvd8oMnT0M_-00WeNaZ61AgM5GNcq7wltve"/>
</div>
</div>
</nav>
<main class="h-screen flex flex-col pt-16">
<!-- Interactive Map Section -->
<section class="relative flex-grow min-h-[353px] bg-surface-container">
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover grayscale opacity-80 brightness-105" data-alt="Modern minimalist city street map view" data-location="New York City" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAvWP7TdZLc8ZdyGwHSS-rismk3paxUHB2SrNi8eHPgo63KfmLHuaUUtLiV9l-dplx85iONuGPHzh1vprh7D1ahCDHgU5NvkXCiTxAA-RPwCRInUA9xADcmkRAvODCuNCv5ZUNDuMSvGqh3-lyzn7PV_4NSLEBY05ApPEVjuXCEM8UyOzwFEoanZBrky9cWqm9WOEAh-S92e5vC47XRfc3MeaasXxuDduwphhx14GKx8lkGoMZl0k91mLmsxjaSQXN3Fs8NIvQJ1t6L"/>
<div class="absolute inset-0 map-gradient-overlay pointer-events-none"></div>
</div>
<!-- Central Pin Drop -->
<div class="absolute inset-0 flex items-center justify-center z-10 pointer-events-none">
<div class="relative flex flex-col items-center mb-10">
<div class="bg-primary text-white w-12 h-12 rounded-full flex items-center justify-center shadow-2xl animate-bounce">
<span class="material-symbols-outlined scale-125" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<div class="w-2 h-2 bg-primary/20 rounded-full blur-[2px] mt-1"></div>
</div>
</div>
<!-- Map Controls -->
<div class="absolute bottom-12 right-6 z-20 flex flex-col gap-2">
<button class="bg-surface-container-lowest p-3 rounded-xl shadow-xl active:scale-95 transition-all text-primary">
<span class="material-symbols-outlined" data-icon="my_location">my_location</span>
</button>
<button class="bg-surface-container-lowest p-3 rounded-xl shadow-xl active:scale-95 transition-all text-primary">
<span class="material-symbols-outlined" data-icon="layers">layers</span>
</button>
</div>
</section>
<!-- Address Sheet -->
<section class="bg-surface-container-lowest rounded-t-[2.5rem] shadow-[0_-8px_40px_rgba(0,13,34,0.08)] relative z-30 px-6 pt-8 pb-32 -mt-8 flex-shrink-0">
<div class="w-12 h-1.5 bg-surface-container-high rounded-full mx-auto mb-8"></div>
<div class="max-w-xl mx-auto space-y-8">
<!-- Search Field -->
<div class="space-y-2">
<label class="font-headline font-bold text-xs uppercase tracking-widest text-on-surface-variant ml-1">Search for address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined" data-icon="search">search</span>
</div>
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-secondary/20 font-medium transition-all placeholder:text-outline/60" placeholder="Enter street, city or zip" type="text"/>
</div>
</div>
<!-- Labels Grid -->
<div class="space-y-4">
<label class="font-headline font-bold text-xs uppercase tracking-widest text-on-surface-variant ml-1">Label as</label>
<div class="grid grid-cols-3 gap-3">
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-xl border-2 border-secondary bg-secondary/5 text-secondary font-semibold transition-all">
<span class="material-symbols-outlined text-sm" data-icon="home" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="text-sm">Home</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-xl border-2 border-transparent bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high font-medium transition-all">
<span class="material-symbols-outlined text-sm" data-icon="work">work</span>
<span class="text-sm">Work</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-xl border-2 border-transparent bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high font-medium transition-all">
<span class="material-symbols-outlined text-sm" data-icon="stars">stars</span>
<span class="text-sm">Other</span>
</button>
</div>
</div>
<!-- Custom Note -->
<div class="space-y-2">
<label class="font-headline font-bold text-xs uppercase tracking-widest text-on-surface-variant ml-1">Delivery Instructions (Optional)</label>
<textarea class="w-full bg-surface-container-low border-none rounded-xl py-4 px-4 focus:ring-2 focus:ring-secondary/20 font-medium transition-all placeholder:text-outline/60 resize-none" placeholder="Gate code, drop-off spot, etc." rows="2"></textarea>
</div>
</div>
</section>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full bg-white/80 backdrop-blur-xl px-6 py-6 z-40">
<div class="max-w-xl mx-auto">
<button class="w-full bg-secondary text-white font-headline font-extrabold py-5 rounded-full shadow-lg shadow-secondary/20 hover:bg-secondary-container transition-all active:scale-[0.98] duration-200">
                Save Location
            </button>
</div>
</div>
<!-- BottomNavBar (Hidden on desktop, shown on mobile as requested by Shell Logic) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl z-50 rounded-t-3xl shadow-[0_-4px_24px_rgba(0,13,34,0.06)] pointer-events-none opacity-0 translate-y-full transition-all">
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2">
<span class="material-symbols-outlined" data-icon="local_shipping">local_shipping</span>
<span class="font-manrope font-medium text-[11px] uppercase tracking-widest mt-1">Ship</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2">
<span class="material-symbols-outlined" data-icon="explore">explore</span>
<span class="font-manrope font-medium text-[11px] uppercase tracking-widest mt-1">Track</span>
</div>
<div class="flex flex-col items-center justify-center text-blue-700 dark:text-blue-400 font-bold bg-blue-50 dark:bg-blue-900/30 rounded-2xl px-5 py-2">
<span class="material-symbols-outlined" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>
<span class="font-manrope font-medium text-[11px] uppercase tracking-widest mt-1">Addresses</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-manrope font-medium text-[11px] uppercase tracking-widest mt-1">Profile</span>
</div>
</nav>
</body></html>
