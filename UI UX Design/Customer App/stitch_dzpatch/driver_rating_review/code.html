<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-low": "#f1f4f6",
              "on-secondary-fixed": "#001356",
              "surface-bright": "#f7fafc",
              "on-primary-container": "#768baf",
              "on-primary-fixed-variant": "#324768",
              "tertiary": "#1d0600",
              "on-tertiary-fixed": "#341100",
              "surface-variant": "#e0e3e5",
              "secondary-fixed-dim": "#b8c3ff",
              "on-secondary": "#ffffff",
              "on-background": "#181c1e",
              "surface-container-highest": "#e0e3e5",
              "inverse-primary": "#b2c7ef",
              "secondary-container": "#2e5bff",
              "on-error": "#ffffff",
              "on-secondary-container": "#efefff",
              "tertiary-fixed-dim": "#ffb692",
              "secondary-fixed": "#dde1ff",
              "primary-container": "#0a2342",
              "on-tertiary": "#ffffff",
              "on-secondary-fixed-variant": "#0035be",
              "on-primary": "#ffffff",
              "outline-variant": "#c4c6cf",
              "surface": "#f7fafc",
              "on-tertiary-fixed-variant": "#7a3000",
              "surface-container": "#ebeef0",
              "on-primary-fixed": "#021c3a",
              "error-container": "#ffdad6",
              "surface-container-lowest": "#ffffff",
              "tertiary-container": "#401600",
              "surface-tint": "#4a5f81",
              "secondary": "#0040e0",
              "surface-container-high": "#e5e9eb",
              "on-tertiary-container": "#e66100",
              "surface-dim": "#d7dadc",
              "on-surface-variant": "#44474e",
              "on-error-container": "#93000a",
              "primary-fixed-dim": "#b2c7ef",
              "primary": "#000d22",
              "background": "#f7fafc",
              "error": "#ba1a1a",
              "inverse-surface": "#2d3133",
              "outline": "#74777e",
              "tertiary-fixed": "#ffdbcb",
              "primary-fixed": "#d5e3ff",
              "on-surface": "#181c1e",
              "inverse-on-surface": "#eef1f3"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .star-active {
            font-variation-settings: 'FILL' 1;
            color: #e66100;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7fafc;
        }
        h1, h2, h3 {
            font-family: 'Manrope', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-surface antialiased">
<!-- TopAppBar Shell -->
<header class="fixed top-0 w-full z-50 bg-white/70 dark:bg-slate-900/70 backdrop-blur-md shadow-sm dark:shadow-none flex justify-between items-center px-6 py-4">
<button class="text-slate-500 hover:bg-slate-100 transition-colors active:scale-95 duration-200 p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-['Manrope'] font-bold text-lg tracking-tight text-slate-900 dark:text-slate-50">Rate Driver</h1>
<button class="text-blue-700 dark:text-blue-400 font-['Inter'] font-medium text-sm hover:bg-slate-100 transition-colors active:scale-95 duration-200 px-3 py-1 rounded-lg">Skip</button>
</header>
<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto space-y-10">
<!-- Rider Info Section (Asymmetric Momentum) -->
<section class="flex flex-col items-center text-center space-y-4">
<div class="relative group">
<div class="absolute -inset-1 bg-gradient-to-tr from-secondary to-secondary-fixed-dim rounded-full blur opacity-25 group-hover:opacity-40 transition duration-1000"></div>
<img alt="Driver Avatar" class="relative w-24 h-24 rounded-full border-4 border-surface-container-lowest object-cover shadow-lg" data-alt="Professional portrait of a male delivery driver" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCFR96Q2XATNjAoxQIbb2wQ4ywEfEBQzJNaSYwCQZ1DmD6yMOYWDiCIOkTX9TB31dCzYx-KkJMjlqJLgT65DBahCGWFnR_foKUK016pO1ueFoxoWNru0wIN153KV121bEU8zPn_tmNrh-2_uhAXHQqIPD_-zFWFLGX7ak0goppmvQRby-ES9gWjaPyLPQJdokzUBr0M7pJMXwKKu5W2NPCwhlAz9p9V1YRsIGIPcAhAxM2vPQQ-KUDKu0jT9C7MjNSCBpqHCteHntWm"/>
</div>
<div class="space-y-1">
<h2 class="text-2xl font-extrabold tracking-tight text-primary">John D.</h2>
<div class="flex items-center justify-center space-x-2 text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]" data-icon="directions_bike">directions_bike</span>
<span class="text-sm font-medium">Blue Yamaha MT-07 • ABC-123DE</span>
</div>
</div>
</section>
<!-- Star Rating Section -->
<section class="bg-surface-container-lowest rounded-xl p-8 flex flex-col items-center space-y-6">
<p class="font-headline font-bold text-lg text-primary">How was your delivery?</p>
<div class="flex space-x-3">
<button class="active:scale-90 transition-transform"><span class="material-symbols-outlined text-5xl star-active" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span></button>
<button class="active:scale-90 transition-transform"><span class="material-symbols-outlined text-5xl star-active" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span></button>
<button class="active:scale-90 transition-transform"><span class="material-symbols-outlined text-5xl star-active" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span></button>
<button class="active:scale-90 transition-transform"><span class="material-symbols-outlined text-5xl star-active" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span></button>
<button class="active:scale-90 transition-transform"><span class="material-symbols-outlined text-5xl text-surface-variant" data-icon="star">star</span></button>
</div>
</section>
<!-- Feedback Tags (Bento-style chips) -->
<section class="space-y-4">
<h3 class="text-xs font-bold tracking-[0.1em] text-on-surface-variant uppercase px-1">What went well?</h3>
<div class="flex flex-wrap gap-3">
<button class="px-5 py-2.5 rounded-full border border-outline-variant hover:border-secondary hover:text-secondary text-sm font-semibold transition-all bg-surface-container-lowest">Fast</button>
<button class="px-5 py-2.5 rounded-full bg-secondary text-white text-sm font-semibold transition-all">Safe Driver</button>
<button class="px-5 py-2.5 rounded-full border border-outline-variant hover:border-secondary hover:text-secondary text-sm font-semibold transition-all bg-surface-container-lowest">Polite</button>
<button class="px-5 py-2.5 rounded-full border border-outline-variant hover:border-secondary hover:text-secondary text-sm font-semibold transition-all bg-surface-container-lowest">Great Communication</button>
<button class="px-5 py-2.5 rounded-full border border-outline-variant hover:border-secondary hover:text-secondary text-sm font-semibold transition-all bg-surface-container-lowest">Good Handling</button>
</div>
</section>
<!-- Review Input -->
<section class="space-y-3">
<label class="text-xs font-bold tracking-[0.1em] text-on-surface-variant uppercase px-1">Detailed Review</label>
<textarea class="w-full min-h-[120px] p-5 bg-surface-container-highest border-none rounded-xl focus:ring-0 focus:outline-none placeholder:text-outline text-on-surface font-body transition-all" placeholder="Tell us more about your experience (Optional)"></textarea>
<div class="h-0.5 w-full bg-surface-container transition-all group-focus-within:bg-on-tertiary-container"></div>
</section>
<!-- Tip Selection -->
<section class="space-y-5">
<h3 class="text-xs font-bold tracking-[0.1em] text-on-surface-variant uppercase px-1">Add a Tip</h3>
<div class="grid grid-cols-4 gap-3">
<button class="flex items-center justify-center aspect-square rounded-full border border-outline-variant bg-surface-container-lowest hover:bg-secondary-fixed transition-colors">
<span class="text-sm font-bold">₦200</span>
</button>
<button class="flex items-center justify-center aspect-square rounded-full border-2 border-secondary bg-secondary-fixed text-secondary">
<span class="text-sm font-bold">₦500</span>
</button>
<button class="flex items-center justify-center aspect-square rounded-full border border-outline-variant bg-surface-container-lowest hover:bg-secondary-fixed transition-colors">
<span class="text-sm font-bold">₦1000</span>
</button>
<button class="flex items-center justify-center aspect-square rounded-full border border-outline-variant bg-surface-container-lowest hover:bg-secondary-fixed transition-colors">
<span class="text-xs font-bold uppercase">Other</span>
</button>
</div>
</section>
</main>
<!-- Fixed Primary Action -->
<footer class="fixed bottom-0 left-0 w-full p-6 bg-white/80 backdrop-blur-xl border-t border-surface-container">
<div class="max-w-2xl mx-auto">
<button class="w-full bg-secondary hover:bg-on-secondary-fixed-variant text-white font-headline font-extrabold text-base py-4 rounded-xl shadow-[0_10px_25px_-5px_rgba(0,64,224,0.4)] active:scale-[0.98] transition-all flex items-center justify-center space-x-3">
<span>Submit Feedback</span>
<span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</footer>
</body></html>
