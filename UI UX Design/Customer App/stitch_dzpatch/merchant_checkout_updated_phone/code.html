<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#324768",
                        "on-secondary-container": "#efefff",
                        "outline-variant": "#c4c6cf",
                        "secondary": "#0040e0",
                        "surface-container": "#ebeef0",
                        "secondary-container": "#2e5bff",
                        "surface-container-low": "#f1f4f6",
                        "surface-container-high": "#e5e9eb",
                        "on-tertiary-fixed": "#341100",
                        "tertiary-container": "#401600",
                        "on-secondary": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#181c1e",
                        "on-secondary-fixed": "#001356",
                        "on-tertiary-container": "#e66100",
                        "on-surface-variant": "#44474e",
                        "surface-dim": "#d7dadc",
                        "inverse-surface": "#2d3133",
                        "primary-fixed-dim": "#b2c7ef",
                        "tertiary-fixed-dim": "#ffb692",
                        "surface": "#f7fafc",
                        "background": "#f7fafc",
                        "surface-tint": "#4a5f81",
                        "error": "#ba1a1a",
                        "primary-container": "#0a2342",
                        "inverse-primary": "#b2c7ef",
                        "outline": "#74777e",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed-variant": "#7a3000",
                        "on-background": "#181c1e",
                        "on-error": "#ffffff",
                        "on-primary-container": "#768baf",
                        "primary": "#000d22",
                        "secondary-fixed-dim": "#b8c3ff",
                        "primary-fixed": "#d5e3ff",
                        "surface-container-highest": "#e0e3e5",
                        "tertiary": "#1d0600",
                        "on-secondary-fixed-variant": "#0035be",
                        "inverse-on-surface": "#eef1f3",
                        "surface-variant": "#e0e3e5",
                        "secondary-fixed": "#dde1ff",
                        "tertiary-fixed": "#ffdbcb",
                        "on-primary-fixed": "#021c3a",
                        "surface-bright": "#f7fafc"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7fafc;
        }
        .headline-font { font-family: 'Manrope', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="sticky top-0 w-full z-50 bg-white/70 backdrop-blur-xl shadow-sm shadow-[#000d22]/5">
<div class="flex items-center justify-between px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button class="text-[#0040e0] active:scale-95 duration-200">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="text-[#000d22] font-black uppercase tracking-widest text-sm headline-font">DZPatch</div>
</div>
<div class="font-['Manrope'] font-bold text-lg tracking-tight text-[#0040e0]">Merchant Booking</div>
<button class="text-[#0040e0] active:scale-95 duration-200">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
<div class="bg-slate-100 h-[1px] w-full"></div>
</header>
<main class="flex-grow max-w-2xl mx-auto w-full px-6 py-8 pb-32">
<!-- Asymmetric Momentum Header -->
<div class="mb-10">
<span class="text-on-tertiary-container font-semibold tracking-wider text-[10px] uppercase bg-tertiary-fixed px-3 py-1 rounded-full mb-3 inline-block">Secure Checkout</span>
<h1 class="headline-font font-extrabold text-4xl text-primary tracking-tight leading-tight">Complete your <br/>payment safely.</h1>
</div>
<!-- Merchant Identity Card (Level 2 Interaction) -->
<div class="bg-surface-container-lowest rounded-xl p-6 mb-8 flex items-center justify-between shadow-sm border border-outline-variant/10">
<div class="flex items-center gap-4">
<div class="w-16 h-16 rounded-full bg-secondary-fixed flex items-center justify-center overflow-hidden">
<img class="w-full h-full object-cover" data-alt="Artisan bakery fresh bread and storefront" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAyeDcphnV4DW7kPyY61TsiJVEMNOCr-2ITXUPc-__pvjVBckUwTV5fDe_FUlermc7TZFpCqb_KvDcWgAxVD0wDijc0I4kxPe4PBja4Fq7hqeEK20fYlaKL5SrxG5Q5jEXReTyUNUD2uH_kQu_ymCqWsyApVapcP2AbGBwHyOzopKmZoLTg9GpUQwBgNeHjwe2NXk6_q-lcWry30M2IYIFVr9gLFHO-LoIM6B4CPC9wWrhwoLL7_5hv4L1pngFlzrHOKrE0QrqJtUym"/>
</div>
<div>
<h2 class="headline-font font-bold text-xl text-primary">Artisan Bakery</h2>
<div class="flex items-center gap-1 text-on-primary-container text-sm">
<span class="material-symbols-outlined text-[16px]">verified</span>
<span>Verified Merchant</span>
</div>
</div>
</div>
<div class="text-right">
<p class="text-[10px] uppercase font-bold text-on-surface-variant tracking-widest mb-1">Status</p>
<span class="bg-secondary/10 text-secondary text-xs font-bold px-3 py-1 rounded-full">Online</span>
</div>
</div>
<!-- Booking Form -->
<div class="space-y-6">
<!-- Amount Input (Level 1 Surface) -->
<div class="bg-surface-container-low rounded-xl p-6 border-b-2 border-transparent focus-within:border-tertiary-fixed transition-all">
<label class="block headline-font font-bold text-sm text-on-surface-variant uppercase tracking-widest mb-4">Amount to Pay</label>
<div class="flex items-baseline gap-2">
<span class="headline-font font-extrabold text-3xl text-primary">₦</span>
<input class="bg-transparent border-none p-0 focus:ring-0 headline-font font-extrabold text-5xl text-primary w-full tracking-tighter" placeholder="0" type="text" value="1,500"/>
</div>
</div>
<!-- Bento-style Inputs -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="bg-surface-container-low rounded-xl p-6 transition-all hover:bg-surface-container-high">
<label class="block headline-font font-bold text-xs text-on-surface-variant uppercase tracking-widest mb-2">Delivery Address</label>
<div class="flex items-start gap-3">
<span class="material-symbols-outlined text-secondary mt-1">location_on</span>
<textarea class="bg-transparent border-none p-0 focus:ring-0 text-on-surface w-full resize-none font-medium text-sm" placeholder="Enter delivery details..." rows="2"></textarea>
</div>
</div>
<div class="bg-surface-container-low rounded-xl p-6 transition-all hover:bg-surface-container-high">
<label class="block headline-font font-bold text-xs text-on-surface-variant uppercase tracking-widest mb-2">Your Email</label>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-secondary">mail</span>
<input class="bg-transparent border-none p-0 focus:ring-0 text-on-surface w-full font-medium text-sm" placeholder="For your receipt" type="email"/>
</div>
</div>
</div><div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
<div class="bg-surface-container-low rounded-xl p-6 transition-all hover:bg-surface-container-high">
<label class="block headline-font font-bold text-xs text-on-surface-variant uppercase tracking-widest mb-2">Primary Phone Number (Required)</label>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-secondary">call</span>
<input class="bg-transparent border-none p-0 focus:ring-0 text-on-surface w-full font-medium text-sm" placeholder="+234 --- --- ----" required="" type="tel"/>
</div>
</div>
<div class="bg-surface-container-low rounded-xl p-6 transition-all hover:bg-surface-container-high">
<label class="block headline-font font-bold text-xs text-on-surface-variant uppercase tracking-widest mb-2">Secondary Phone Number (Optional)</label>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-secondary">call</span>
<input class="bg-transparent border-none p-0 focus:ring-0 text-on-surface w-full font-medium text-sm" placeholder="+234 --- --- ----" type="tel"/>
</div>
</div>
</div>
<div class="bg-surface-container-low rounded-xl p-6 transition-all hover:bg-surface-container-high">
<label class="block headline-font font-bold text-xs text-on-surface-variant uppercase tracking-widest mb-2">Note / Item Description</label>
<div class="flex items-start gap-3">
<span class="material-symbols-outlined text-secondary mt-1">description</span>
<textarea class="bg-transparent border-none p-0 focus:ring-0 text-on-surface w-full resize-none font-medium text-sm" placeholder="Specify items (e.g. 2x Sourdough Loaves)" rows="3"></textarea>
</div>
</div>
<!-- Transaction Summary -->
<div class="p-6 border-t border-outline-variant/30 mt-4">
<div class="flex justify-between items-center mb-2">
<span class="text-on-surface-variant text-sm">Subtotal</span>
<span class="font-bold text-primary">₦1,500.00</span>
</div>
<div class="flex justify-between items-center mb-6">
<span class="text-on-surface-variant text-sm">Service Fee</span>
<span class="text-secondary font-medium">Included</span>
</div>
<div class="flex justify-between items-center">
<span class="headline-font font-extrabold text-xl text-primary">Order Total</span>
<span class="headline-font font-extrabold text-2xl text-primary">₦1,500.00</span>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-secondary text-white headline-font font-bold py-5 rounded-xl text-lg hover:shadow-lg hover:shadow-secondary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-3 mt-4">
                Pay
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
<!-- Trust Indicator -->
<div class="flex justify-center items-center gap-2 text-on-primary-container/60 mt-8">
<span class="material-symbols-outlined text-[18px]">lock</span>
<p class="text-[11px] font-medium uppercase tracking-widest">End-to-end Encrypted Payment</p>
</div>
</div>
</main>
<!-- BottomNavBar (Suppressed for focused Transactional task as per mandate) -->
<!-- Manual Navigation Suppressed: Transactional Screen -->
</body></html>
