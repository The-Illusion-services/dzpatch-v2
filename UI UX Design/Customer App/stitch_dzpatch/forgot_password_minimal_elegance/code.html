        }

    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<nav class="bg-white/70 dark:bg-slate-950/70 backdrop-blur-md fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 w-full shadow-sm shadow-blue-900/5">
<div class="flex items-center gap-4">
<button class="active:scale-95 duration-200 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors p-2 rounded-full">
<span class="material-symbols-outlined text-blue-700 dark:text-blue-500">arrow_back</span>
</button>
<span class="text-2xl font-black text-slate-900 dark:text-slate-50 tracking-tighter font-headline">Dzpatch</span>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-4 pt-16 pb-24">
<div class="max-w-md w-full">
<!-- Header Section -->
<div class="mb-12 text-center md:text-left">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-surface-container-low mb-6">
<span class="material-symbols-outlined text-secondary text-3xl" data-icon="lock_reset">lock_reset</span>
</div>
<h1 class="text-on-surface font-headline font-extrabold text-4xl tracking-tight mb-4">Forgot password?</h1>
<p class="text-on-surface-variant font-body text-lg leading-relaxed">
                    No worries. Enter your registered email or phone number and we'll send you a link to reset your access.
                </p>
</div>
<!-- Form Card -->
<div class="bg-surface-container-lowest p-8 md:p-10 rounded-xl shadow-sm border border-outline-variant/10">
<form class="space-y-8">
<!-- Single Input Field -->
<div class="space-y-2">
<label class="font-label text-sm font-semibold uppercase tracking-wider text-on-surface-variant ml-1" for="identifier">
                            Email or Phone Number
                        </label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline transition-colors group-focus-within:text-secondary" data-icon="mail">mail</span>
</div>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-highest border-none rounded-xl font-body text-on-surface placeholder:text-outline/50 focus:ring-0 focus:outline-none transition-all" id="identifier" name="identifier" placeholder="name@company.com" type="text"/>
<!-- Focus Indicator (Design System) -->
<div class="absolute bottom-0 left-0 w-full h-0.5 bg-tertiary-fixed scale-x-0 group-focus-within:scale-x-100 transition-transform origin-center"></div>
</div>
</div>
<!-- Prominent Reset Button -->
<button class="w-full h-14 bg-secondary text-on-secondary font-headline font-bold text-lg rounded-xl hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-3" type="submit">
                        Send Reset Link
                        <span class="material-symbols-outlined text-xl" data-icon="send">send</span>
</button>
</form>
<!-- Help Link -->
<div class="mt-8 text-center">
<p class="text-on-surface-variant font-body text-sm">
                        Remembered it? 
                        <a class="text-secondary font-semibold hover:underline decoration-2 underline-offset-4 ml-1" href="#">Back to Login</a>
</p>
</div>
</div>
<!-- Asymmetric Data Brick (Visual Detail) -->
<div class="mt-12 flex items-center justify-center md:justify-start gap-4">
<div class="h-px bg-outline-variant/30 flex-grow hidden md:block"></div>
<div class="flex items-center gap-2 bg-surface-container-high py-2 px-4 rounded-full border border-outline-variant/10">
<span class="material-symbols-outlined text-on-surface-variant text-sm" data-icon="verified_user">verified_user</span>
<span class="font-label text-[11px] font-bold uppercase tracking-widest text-on-surface-variant">Secure AES-256 Encryption</span>
</div>
</div>
</div>
</main>
<!-- Footer Illustration / Background Accent -->
<div class="fixed bottom-0 left-0 w-full h-1/3 -z-10 opacity-30 pointer-events-none">
<div class="absolute inset-0 bg-gradient-to-t from-secondary/10 to-transparent"></div>
<div class="absolute bottom-0 left-0 w-full h-full" data-alt="Soft blue ambient gradient reflecting security and trust" style="background-image: radial-gradient(circle at 50% 120%, rgba(0, 64, 224, 0.08) 0%, transparent 70%);">
</div>
</div>
