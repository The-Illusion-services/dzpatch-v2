<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface": "#f7fafc",
                        "on-error": "#ffffff",
                        "on-secondary-container": "#efefff",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed": "#021c3a",
                        "primary-container": "#0a2342",
                        "surface-container-low": "#f1f4f6",
                        "tertiary-fixed-dim": "#ffb692",
                        "on-tertiary-fixed": "#341100",
                        "inverse-on-surface": "#eef1f3",
                        "surface-bright": "#f7fafc",
                        "on-surface-variant": "#44474e",
                        "surface-variant": "#e0e3e5",
                        "tertiary": "#1d0600",
                        "surface-dim": "#d7dadc",
                        "on-secondary-fixed-variant": "#0035be",
                        "tertiary-container": "#401600",
                        "surface-tint": "#4a5f81",
                        "on-primary-fixed-variant": "#324768",
                        "tertiary-fixed": "#ffdbcb",
                        "primary-fixed": "#d5e3ff",
                        "secondary-container": "#2e5bff",
                        "secondary-fixed": "#dde1ff",
                        "primary": "#000d22",
                        "outline": "#74777e",
                        "inverse-surface": "#2d3133",
                        "surface-container": "#ebeef0",
                        "surface-container-high": "#e5e9eb",
                        "on-secondary-fixed": "#001356",
                        "on-background": "#181c1e",
                        "background": "#f7fafc",
                        "outline-variant": "#c4c6cf",
                        "error": "#ba1a1a",
                        "surface-container-highest": "#e0e3e5",
                        "on-error-container": "#93000a",
                        "inverse-primary": "#b2c7ef",
                        "secondary": "#0040e0",
                        "on-primary": "#ffffff",
                        "secondary-fixed-dim": "#b8c3ff",
                        "on-tertiary-fixed-variant": "#7a3000",
                        "on-surface": "#181c1e",
                        "error-container": "#ffdad6",
                        "primary-fixed-dim": "#b2c7ef",
                        "on-tertiary-container": "#e66100",
                        "on-primary-container": "#768baf",
                        "on-secondary": "#ffffff",
                        "surface-container-lowest": "#ffffff"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .kinetic-gradient {
            background: linear-gradient(135deg, #000d22 0%, #0a2342 100%);
        }
        .glass-header {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-background antialiased overflow-hidden">
<!-- Top Navigation Bar (Branding Anchor) -->
<header class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-md shadow-sm flex items-center justify-between px-6 py-4 w-full">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#0040e0]" data-icon="speed">speed</span>
<h1 class="font-headline font-extrabold tracking-tighter text-xl text-[#000d22]">Dzpatch</h1>
</div>
<div class="flex items-center gap-1">
<div class="w-1.5 h-1.5 rounded-full bg-secondary"></div>
<div class="w-1.5 h-1.5 rounded-full bg-surface-variant"></div>
<div class="w-1.5 h-1.5 rounded-full bg-surface-variant"></div>
</div>
</header>
<main class="relative h-screen flex flex-col justify-center px-12 pt-20 pb-32 max-w-2xl mx-auto">
<!-- Illustration Area (Asymmetric Momentum) -->
<div class="relative w-full mb-16 flex justify-center items-center">
<!-- Background Accent Shape -->
<div class="absolute -z-10 w-64 h-64 bg-secondary/5 rounded-full blur-3xl"></div>
<!-- Kinetic Illustration Content -->
<div class="relative group">
<div class="absolute inset-0 bg-secondary/10 translate-x-4 translate-y-4 rounded-xl -rotate-3 transition-transform duration-500"></div>
<div class="relative bg-primary-container p-8 rounded-xl shadow-2xl border border-white/10 overflow-hidden min-w-[280px]">
<div class="absolute top-0 right-0 p-4">
<span class="material-symbols-outlined text-secondary-fixed text-4xl opacity-20" data-icon="rocket_launch">rocket_launch</span>
</div>
<div class="flex flex-col gap-6">
<div class="flex items-center gap-4">
<div class="w-12 h-12 bg-secondary rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-white" data-icon="package_2">package_2</span>
</div>
<div class="space-y-1">
<div class="h-2 w-24 bg-white/20 rounded-full"></div>
<div class="h-2 w-16 bg-white/10 rounded-full"></div>
</div>
</div>
<!-- Kinetic Movement Lines -->
<div class="space-y-3">
<div class="flex items-center gap-3">
<div class="h-1 flex-grow bg-gradient-to-r from-secondary to-transparent rounded-full"></div>
<span class="material-symbols-outlined text-secondary text-sm" data-icon="bolt">bolt</span>
</div>
<div class="flex items-center gap-3 opacity-60">
<div class="h-1 flex-grow bg-gradient-to-r from-secondary-fixed-dim to-transparent rounded-full"></div>
<span class="material-symbols-outlined text-secondary-fixed-dim text-sm" data-icon="near_me">near_me</span>
</div>
</div>
<div class="pt-4 border-t border-white/5 flex justify-between items-center">
<span class="text-[10px] font-label font-bold text-on-primary-container uppercase tracking-widest">ETA: 12 MINS</span>
<div class="flex -space-x-2">
<div class="w-6 h-6 rounded-full border-2 border-primary-container bg-surface-variant"></div>
<div class="w-6 h-6 rounded-full border-2 border-primary-container bg-secondary"></div>
</div>
</div>
</div>
</div>
</div>
</div>
<!-- Typography Section -->
<div class="space-y-4">
<span class="inline-block px-3 py-1 bg-secondary/10 text-secondary text-[10px] font-bold tracking-widest uppercase rounded-full">Logistics Evolution</span>
<h2 class="font-headline text-5xl font-extrabold text-primary tracking-tight leading-[1.1]">
                Fast <br/><span class="text-secondary">Delivery</span>
</h2>
<p class="font-body text-lg text-on-surface-variant max-w-md leading-relaxed">
                Experience the next generation of logistics. Secure, real-time tracked packages delivered with architectural precision.
            </p>
</div>
</main>
<!-- Bottom Navigation Bar (Mandatory Shell) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-between items-center px-8 pb-8 pt-4 bg-white shadow-[0_-4px_20px_rgba(0,13,34,0.06)] border-t border-[#e0e3e5]/30 rounded-t-3xl">
<!-- Label: Skip -->
<button class="flex flex-col items-center justify-center text-[#4a5f81] px-4 py-2 hover:text-[#0040e0] transition-all active:opacity-80 scale-98">
<span class="material-symbols-outlined mb-1" data-icon="close">close</span>
<span class="font-headline font-semibold text-xs tracking-wide uppercase">Skip</span>
</button>
<!-- Active Label Logic: Next is the intended focus for Onboarding Screen 1 -->
<button class="flex flex-col items-center justify-center bg-[#0040e0] text-white rounded-xl px-10 py-3 shadow-lg shadow-secondary/20 hover:bg-[#0035be] transition-all active:scale-95 duration-200">
<div class="flex items-center gap-2">
<span class="font-headline font-semibold text-xs tracking-wide uppercase">Next</span>
<span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</div>
</button>
<!-- Label: Get Started (Inactive) -->
<button class="hidden md:flex flex-col items-center justify-center text-[#4a5f81] px-4 py-2 opacity-50 cursor-not-allowed">
<span class="material-symbols-outlined mb-1" data-icon="rocket_launch">rocket_launch</span>
<span class="font-headline font-semibold text-xs tracking-wide uppercase">Get Started</span>
</button>
</nav>
<!-- Decorative Atmosphere (Tonal Layering) -->
<div class="fixed top-0 right-0 -z-20 w-1/2 h-full bg-surface-container-low/50"></div>
<div class="fixed bottom-24 right-12 -z-10">
<span class="text-[12rem] font-headline font-extrabold text-surface-container opacity-40 select-none">01</span>
</div>
</body></html>
